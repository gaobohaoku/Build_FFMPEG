name: Media3 FFmpeg Production Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "codec profile (lite/full/tv)"
        required: true
        default: "full"

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        abi: [arm64-v8a, armeabi-v7a, x86_64]

    env:
      PROFILE: ${{ github.event.inputs.profile }}

    steps:
    # =========================
    # 1. Checkout
    # =========================
    - name: Checkout repo
      uses: actions/checkout@v4

    # =========================
    # 2. Cache NDK + FFmpeg
    # =========================
    - name: Cache dependencies
      uses: actions/cache@v4
      with:
        path: |
          ndk
          ffmpeg
        key: ffmpeg-${{ matrix.abi }}-${{ hashFiles('config/**/*.sh', 'scripts/**/*.sh') }}

    # =========================
    # 3. Install NDK
    # =========================
    - name: Download Android NDK
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
        unzip -q android-ndk-r25c-linux.zip -d ndk
        echo "NDK_PATH=$(pwd)/ndk/android-ndk-r25c" >> $GITHUB_ENV

    # =========================
    # 4. Install cmake
    # =========================
    - name: Download Cmake
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        wget -q https://dl.google.com/android/repository/cmake-3.31.6-linux.zip
        unzip -q cmake-3.31.6-linux.zip -d cmake
        echo "CMAKE_PATH=$(pwd)/cmake/cmake-3.31.6" >> $GITHUB_ENV
        ls $(pwd)/cmake

    # =========================
    # 5. Clone Media3
    # =========================
    - name: Clone Media3
      run: |
        git clone https://github.com/androidx/media.git
        cd media
        git checkout 1.6.1
        echo "MEDIA3_PATH=$(pwd)/libraries/decoder_ffmpeg/src/main" >> $GITHUB_ENV

    # =========================
    # 6. Clone FFmpeg
    # =========================
    - name: Clone FFmpeg
      if: steps.cache.outputs.cache-hit != 'true'
      run: |
        git clone git://source.ffmpeg.org/ffmpeg
        cd ffmpeg
        git checkout release/6.0
        echo "FFMPEG_PATH=$(pwd)" >> $GITHUB_ENV

    # =========================
    # 7. Build FFmpeg (per ABI)
    # =========================
    - name: Build FFmpeg
      run: |
        bash scripts/build_ffmpeg.sh $NDK_PATH $CMAKE_PATH

    # =========================
    # 7. Upload artifacts
    # =========================
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ffmpeg-so-files
        # 把编译好的 decoder_ffmpeg 整个文件夹打包给你
        path: media/libraries/decoder_ffmpeg/
